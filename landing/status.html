<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relix Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      line-height: 1.6;
      padding: 2rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: #888; margin-bottom: 2rem; }
    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .status-all-good { background: #22c55e; }
    .status-degraded { background: #eab308; }
    .status-down { background: #ef4444; }
    .service {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .service-name { font-weight: 500; }
    .service-status { color: #888; font-size: 0.9rem; }
    .uptime {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 2rem;
    }
    .uptime-title { color: #888; margin-bottom: 1rem; }
    .uptime-bar {
      display: flex;
      height: 40px;
      gap: 2px;
    }
    .uptime-day {
      flex: 1;
      background: #22c55e;
      border-radius: 2px;
    }
    .uptime-day.down { background: #ef4444; }
    .uptime-day.degraded { background: #eab308; }
    .footer {
      margin-top: 3rem;
      color: #666;
      font-size: 0.9rem;
      text-align: center;
    }
    .footer a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐉 Relix Status</h1>
    <p class="subtitle">All systems operational</p>

    <div class="service">
      <div>
        <span class="status-indicator status-all-good"></span>
        <span class="service-name">API Server</span>
      </div>
      <span class="service-status">Operational</span>
    </div>

    <div class="service">
      <div>
        <span class="status-indicator status-all-good"></span>
        <span class="service-name">WebSocket Relay</span>
      </div>
      <span class="service-status">Operational</span>
    </div>

    <div class="service">
      <div>
        <span class="status-indicator status-all-good"></span>
        <span class="service-name">PostgreSQL</span>
      </div>
      <span class="service-status">Operational</span>
    </div>

    <div class="service">
      <div>
        <span class="status-indicator status-all-good"></span>
        <span class="service-name">Mobile App</span>
      </div>
      <span class="service-status">Operational</span>
    </div>

    <div class="uptime">
      <p class="uptime-title">30-Day Uptime</p>
      <div class="uptime-bar">
        <!-- 30 days of uptime visualization -->
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
        <div class="uptime-day"></div><div class="uptime-day"></div><div class="uptime-day"></div>
      </div>
      <p style="margin-top: 1rem; color: #888;">99.9% uptime over last 30 days</p>
    </div>

    <div class="footer">
      <p>Subscribe to updates: <a href="#">RSS</a> | <a href="#">Email</a></p>
      <p style="margin-top: 0.5rem;">
        <a href="https://relix.sh">← Back to Relix</a> | 
        <a href="https://github.com/relixdev/relix/issues">Report an Issue</a>
      </p>
    </div>
  </div>

  <script>
    // Auto-refresh status every 60 seconds
    setTimeout(() => location.reload(), 60000);
  </script>
</body>
</html>

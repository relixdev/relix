app = "relix-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 5000
    soft_limit = 4000

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
